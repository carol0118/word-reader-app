<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff7a18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="英语点读" />
    <title>英语单词点读</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell app-shell-library">
      <section class="hero-card hero-card-library">
        <p class="eyebrow">Unit Reader</p>
        <h1>按单元查单词<br />点一下就能读</h1>
        <p class="subtitle">
          已按 Unit 分类整理。孩子点开单词时，会直接朗读，并在下面显示拆读提示，比如
          <span class="inline-sample">t en</span>。
        </p>

        <div class="search-wrap">
          <input id="searchInput" class="search-input" type="search" placeholder="搜索单词，如 ten / breakfast" />
          <span id="statusText" class="status-pill">请选择一个单元或直接搜索</span>
        </div>

        <div id="unitTabs" class="unit-tabs"></div>
      </section>

      <section class="detail-card">
        <div class="card-head">
          <div>
            <h2 id="detailTitle">点击右侧单词开始点读</h2>
            <p id="detailSubtitle">会显示中文意思和拆读方式。</p>
          </div>
          <div class="legend">本机语音</div>
        </div>

        <div id="detailPanel" class="detail-panel empty-detail">
          <div class="detail-word">例如：ten</div>
          <div class="detail-meaning">中文：十</div>
          <div class="detail-read">拆读</div>
          <div class="segment-row">
            <span class="segment-pill">t</span>
            <span class="segment-pill">en</span>
          </div>
        </div>
      </section>

      <section class="result-card library-card">
        <div class="card-head">
          <div>
            <h2 id="resultTitle">Unit 1</h2>
            <p id="resultDescription">点任意单词卡片开始发音。</p>
          </div>
        </div>
        <div id="wordGrid" class="word-grid"></div>
      </section>
    </main>

    <button id="installBtn" class="install-btn" hidden>安装到手机桌面</button>
    <script src="./app.js" type="module"></script>
  </body>
</html>
