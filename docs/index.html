<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff7a18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="英语点读" />
    <title>英语单词点读</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app-shell app-shell-library">
      <section class="hero-card hero-card-library">
        <p id="collectionEyebrow" class="eyebrow">Unit Reader</p>
        <h1 id="heroTitle">按单元查单词，点一下就能读</h1>
        <p id="heroSubtitle" class="subtitle">
          保留原来的 Unit 词库，适合快速点读、拼读和按中文意思查找单词。
        </p>

        <div class="search-wrap">
          <input
            id="searchInput"
            class="search-input"
            type="search"
            placeholder="搜索单词，如 breakfast / 柠檬 / electricity"
          />
          <span id="statusText" class="status-pill">请选择内容库，再点开单词卡片开始朗读。</span>
        </div>

        <div id="collectionTabs" class="collection-tabs"></div>
        <div id="unitTabs" class="unit-tabs"></div>
      </section>

      <section class="detail-card">
        <div class="card-head">
          <div>
            <h2 id="detailTitle">点击下方单词开始点读</h2>
            <p id="detailSubtitle">会显示中文意思和拆读提示。</p>
          </div>
          <div class="legend">本机语音</div>
        </div>

        <div id="detailPanel" class="detail-panel empty-detail">
          <div class="detail-word">ten</div>
          <div class="detail-meaning">中文：十</div>
          <div class="detail-read">拆读：t en</div>
          <div class="segment-row">
            <span class="segment-pill">t</span>
            <span class="segment-pill">en</span>
          </div>
        </div>
      </section>

      <section class="result-card library-card">
        <div class="card-head">
          <div>
            <h2 id="resultTitle">Unit 1</h2>
            <p id="resultDescription">点击任意单词卡片开始发音。</p>
          </div>
        </div>
        <div id="wordGrid" class="word-grid"></div>
      </section>

      <section id="readingSection" class="reading-card" hidden>
        <div class="card-head reading-head">
          <div>
            <p class="reading-kicker">Lesson Reading</p>
            <h2 id="readingTitle">We Eat Flowers!</h2>
            <p id="readingMeta">Plants · Science</p>
          </div>
          <button id="playReadingBtn" type="button" class="reading-play-btn">朗读整篇</button>
        </div>
        <div id="readingBody" class="reading-body"></div>
      </section>
    </main>

    <button id="installBtn" class="install-btn" hidden>安装到手机桌面</button>
    <script src="./app.js" type="module"></script>
  </body>
</html>
